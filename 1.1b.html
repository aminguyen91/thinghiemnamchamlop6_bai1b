<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Thí nghiệm: Đun nóng đường</title>
    <style>
        :root {
            --bg-color: #e0f2fe; /* Màu nền xanh nhạt giống hình */
            --stand-color: #95a5a6;
            --glass-color: rgba(255, 255, 255, 0.7);
            --liquid-color: #a8e6cf;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 800px;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 22px;
        }

        /* KHUNG MÔ PHỎNG */
        #canvas-container {
            position: relative;
            width: 100%;
            height: 450px;
            background-color: var(--bg-color);
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* --- DỤNG CỤ THÍ NGHIỆM --- */
        
        /* Đế và cột giá đỡ */
        .stand-base {
            position: absolute;
            bottom: 30px;
            left: 150px;
            width: 300px;
            height: 15px;
            background-color: #7f8c8d;
            border-radius: 5px;
        }
        .stand-pole {
            position: absolute;
            bottom: 45px;
            left: 180px;
            width: 12px;
            height: 320px;
            background-color: var(--stand-color);
            border-radius: 5px 5px 0 0;
        }
        
        /* Chốt và kẹp ngang */
        .stand-clamp {
            position: absolute;
            top: 140px;
            left: 170px;
            width: 32px;
            height: 25px;
            background-color: #636e72;
            border-radius: 3px;
        }
        .stand-arm {
            position: absolute;
            top: 148px;
            left: 195px;
            width: 180px;
            height: 8px;
            background-color: var(--stand-color);
        }

        /* Đĩa kim loại */
        .dish {
            position: absolute;
            top: 142px;
            left: 300px;
            width: 140px;
            height: 6px;
            background-color: #bdc3c7;
            border-radius: 20px;
            border-bottom: 2px solid #95a5a6;
        }
        .dish::before, .dish::after {
            content: '';
            position: absolute;
            top: -2px;
            width: 4px;
            height: 6px;
            background-color: #bdc3c7;
            border-radius: 5px;
        }
        .dish::before { left: 0; }
        .dish::after { right: 0; }

        /* Đèn cồn */
        .lamp-container {
            position: absolute;
            bottom: 45px;
            left: 325px;
            width: 90px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .lamp-cap {
            width: 30px;
            height: 15px;
            background-color: #636e72;
            border-radius: 2px 2px 0 0;
            z-index: 2;
        }
        
        .lamp-body {
            width: 90px;
            height: 70px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 45%, var(--liquid-color) 45%);
            border: 2px solid #2d3436;
            border-radius: 40px 40px 15px 15px;
            position: relative;
            margin-top: -5px;
            z-index: 1;
        }
        
        /* Bấc đèn xoắn */
        .wick {
            position: absolute;
            top: -15px;
            left: 40px;
            width: 8px;
            height: 85px;
            background: repeating-linear-gradient(
                -45deg,
                #b2bec3,
                #b2bec3 4px,
                #636e72 4px,
                #636e72 8px
            );
            z-index: 0;
            border-radius: 4px;
        }

        /* Ngọn lửa */
        .flame {
            position: absolute;
            top: 2px;
            left: 357px;
            width: 25px;
            height: 40px;
            background: radial-gradient(100% 100% at 50% 100%, #f39c12 0%, #e74c3c 60%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            opacity: 0;
            transition: opacity 0.3s;
            animation: flicker 0.5s infinite alternate;
            z-index: 3;
            filter: drop-shadow(0 0 10px #f1c40f);
        }

        @keyframes flicker {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.05) translateY(-2px); }
        }

        /* --- VẬT LIỆU: ĐƯỜNG --- */
        #sugar {
            position: absolute;
            bottom: 6px;
            left: 20px;
            width: 100px;
            height: 25px;
            background-color: #ffffff; /* Màu trắng ban đầu */
            border-radius: 50px 50px 10px 10px;
            transform-origin: bottom center;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1);
            transition: none; /* Điều khiển bằng JS */
        }

        /* Khói */
        .smoke {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: rgba(100, 100, 100, 0.4);
            border-radius: 50%;
            filter: blur(4px);
            animation: rise 2s forwards linear;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-80px) scale(3); opacity: 0; }
        }

        /* --- UI ĐIỀU KHIỂN --- */
        #status-box {
            background-color: #f8fafc;
            border-left: 5px solid #3b82f6;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 500;
            min-height: 48px;
            text-align: left;
            line-height: 1.5;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #e74c3c;
            transition: width 0.1s linear;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        button#btn-reset { background-color: #ef4444; }
        button#btn-reset:hover { background-color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>MÔ PHỎNG: ĐUN NÓNG ĐƯỜNG KIỂM TRA BIẾN ĐỔI CHẤT</h2>
    
    <div id="canvas-container">
        <div class="stand-base"></div>
        <div class="stand-pole"></div>
        <div class="stand-clamp"></div>
        <div class="stand-arm"></div>
        
        <div class="lamp-container">
            <div class="lamp-cap"></div>
            <div class="lamp-body">
                <div class="wick"></div>
            </div>
        </div>
        <div id="flame" class="flame"></div>

        <div class="dish">
            <div id="sugar"></div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div id="progress-bar"></div>
    </div>

    <div id="status-box"><b>Bước 1:</b> Chuẩn bị dụng cụ thí nghiệm. Đường đang ở thể rắn, dạng tinh thể màu trắng. Nhấn "Bắt đầu" để đốt đèn cồn.</div>

    <div class="controls">
        <button id="btn-start">🔥 Bắt đầu thí nghiệm</button>
        <button id="btn-pause" disabled>⏸️ Tạm dừng</button>
        <button id="btn-step">⏭️ Xem từng bước</button>
        <button id="btn-reset">🔄 Làm lại</button>
    </div>
</div>

<script>
    // --- KHỞI TẠO BIẾN ---
    const sugar = document.getElementById('sugar');
    const flame = document.getElementById('flame');
    const statusBox = document.getElementById('status-box');
    const progressBar = document.getElementById('progress-bar');
    const canvas = document.getElementById('canvas-container');
    
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnStep = document.getElementById('btn-step');
    const btnReset = document.getElementById('btn-reset');

    let animationId = null;
    let isPlaying = false;
    let timer = 0; 
    const MAX_TIME = 3000; // 30 giây (mỗi tick ~ 10ms)
    let currentStepIndex = 0; // 0: Chuẩn bị, 1: Nóng chảy, 2: Caramel, 3: Phân hủy

    // --- HÀM HỖ TRỢ NỘI SUY MÀU SẮC ---
    // Chuyển đổi HEX sang RGB
    function hexToRgb(hex) {
        let bigint = parseInt(hex.replace('#', ''), 16);
        return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    }

    // Tính toán màu trung gian
    function lerpColor(c1, c2, factor) {
        const r = Math.round(c1.r + factor * (c2.r - c1.r));
        const g = Math.round(c1.g + factor * (c2.g - c1.g));
        const b = Math.round(c1.b + factor * (c2.b - c1.b));
        return `rgb(${r}, ${g}, ${b})`;
    }

    // Các mốc màu sắc
    const COLOR_WHITE = hexToRgb('#ffffff');      // Rắn
    const COLOR_LIQUID = hexToRgb('#fef08a');     // Lỏng, vàng nhạt
    const COLOR_CARAMEL = hexToRgb('#92400e');    // Nâu cánh gián
    const COLOR_CARBON = hexToRgb('#1c1917');     // Đen khét

    // --- LOGIC MÔ PHỎNG THEO THỜI GIAN ---
    function updateSimulationVisuals() {
        // Cập nhật thanh tiến trình
        progressBar.style.width = `${(timer / MAX_TIME) * 100}%`;

        // Tính toán thời gian (giây)
        const seconds = timer / 100;

        let scaleY = 1;
        let scaleX = 1;
        let color = 'rgb(255,255,255)';
        let text = '';

        if (seconds < 5) {
            // 0 - 5s: Bắt đầu đun, chưa có hiện tượng rõ rệt
            color = `rgb(${COLOR_WHITE.r}, ${COLOR_WHITE.g}, ${COLOR_WHITE.b})`;
            text = "<b>Giai đoạn 1 (0-5s):</b> Đang đun nóng. Đường vẫn ở thể rắn, màu trắng, chưa bị biến đổi.";
            currentStepIndex = 0;
        } 
        else if (seconds >= 5 && seconds < 15) {
            // 5 - 15s: NÓNG CHẢY (Thể rắn -> lỏng, trong suốt/vàng nhạt)
            const factor = (seconds - 5) / 10;
            color = lerpColor(COLOR_WHITE, COLOR_LIQUID, factor);
            scaleY = 1 - (factor * 0.6); // Xẹp xuống 40% chiều cao
            scaleX = 1 + (factor * 0.1); // Lan nhẹ ra 2 bên
            text = "<b>Giai đoạn 2 - Nóng chảy (~150°C):</b> Đường đang chuyển từ thể rắn sang thể <b>lỏng</b>, trở nên đặc sệt và có màu vàng nhạt.";
            currentStepIndex = 1;
        } 
        else if (seconds >= 15 && seconds < 24) {
            // 15 - 24s: CARAMEL HÓA (Thể lỏng, chuyển nâu cánh gián)
            const factor = (seconds - 15) / 9;
            color = lerpColor(COLOR_LIQUID, COLOR_CARAMEL, factor);
            scaleY = 0.4;
            scaleX = 1.1;
            // Hiệu ứng sôi lăn tăn nhẹ (thay đổi scale nhanh)
            if (isPlaying && Math.random() > 0.5) scaleY = 0.38;
            text = "<b>Giai đoạn 3 - Phản ứng Caramel:</b> Đường lỏng chuyển dần sang màu <b>nâu cánh gián</b>. Có mùi thơm đặc trưng, sủi bọt nhẹ.";
            currentStepIndex = 2;
        } 
        else if (seconds >= 24 && seconds <= 30) {
            // 24 - 30s: PHÂN HỦY (Thành than đen)
            const factor = (seconds - 24) / 6;
            color = lerpColor(COLOR_CARAMEL, COLOR_CARBON, factor);
            scaleY = 0.4 - (factor * 0.1); // Xẹp thêm chút thành bã
            scaleX = 1.1;
            text = "<b>Giai đoạn 4 - Phân hủy (Cháy):</b> Nhiệt độ quá cao khiến đường mất nước, phân hủy thành <b>cacbon (than)</b> màu đen, bốc khói khét.";
            currentStepIndex = 3;

            // Tạo hiệu ứng khói bay lên
            if (isPlaying && timer % 10 === 0) {
                createSmoke();
            }
        } 
        else if (seconds > 30) {
            // KẾT LUẬN CUỐI CÙNG
            color = `rgb(${COLOR_CARBON.r}, ${COLOR_CARBON.g}, ${COLOR_CARBON.b})`;
            scaleY = 0.3;
            scaleX = 1.1;
            text = "✨ <b>KẾT LUẬN:</b> Dưới tác dụng của nhiệt độ, đường đã bị biến đổi hoàn toàn tính chất, chuyển từ thể rắn màu trắng sang chất lỏng, cuối cùng tạo thành chất rắn màu đen (than).";
            pauseExperiment();
            btnStart.disabled = true;
            flame.style.opacity = "0"; // Tắt lửa khi xong
        }

        // Áp dụng CSS
        sugar.style.backgroundColor = color;
        sugar.style.transform = `scale(${scaleX}, ${scaleY})`;
        if (statusBox.innerHTML !== text) statusBox.innerHTML = text;
    }

    function createSmoke() {
        const smoke = document.createElement('div');
        smoke.classList.add('smoke');
        // Vị trí ngẫu nhiên trên đĩa đường
        const randomLeft = 320 + Math.random() * 60;
        smoke.style.left = `${randomLeft}px`;
        smoke.style.top = '140px';
        canvas.appendChild(smoke);

        // Tự động xóa khói sau khi bay xong
        setTimeout(() => {
            if(canvas.contains(smoke)) canvas.removeChild(smoke);
        }, 2000);
    }

    // --- ĐIỀU KHIỂN CHÍNH ---
    function loop() {
        if (!isPlaying) return;
        timer += 2; // Tăng tốc độ render
        updateSimulationVisuals();
        if (timer <= MAX_TIME) {
            animationId = requestAnimationFrame(loop);
        }
    }

    function startExperiment() {
        if (timer >= MAX_TIME) return;
        isPlaying = true;
        flame.style.opacity = "1"; // Hiện lửa
        
        btnStart.disabled = true;
        btnPause.disabled = false;
        btnStep.disabled = true;
        
        loop();
    }

    function pauseExperiment() {
        isPlaying = false;
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStep.disabled = false;
        btnStart.innerHTML = "▶️ Tiếp tục";
        cancelAnimationFrame(animationId);
    }

    function resetExperiment() {
        pauseExperiment();
        timer = 0;
        currentStepIndex = 0;
        
        sugar.style.backgroundColor = `rgb(${COLOR_WHITE.r}, ${COLOR_WHITE.g}, ${COLOR_WHITE.b})`;
        sugar.style.transform = `scale(1, 1)`;
        flame.style.opacity = "0";
        progressBar.style.width = "0%";
        statusBox.innerHTML = "<b>Bước 1:</b> Chuẩn bị dụng cụ thí nghiệm. Đường đang ở thể rắn, dạng tinh thể màu trắng. Nhấn 'Bắt đầu' để đốt đèn cồn.";
        
        btnStart.innerHTML = "🔥 Bắt đầu thí nghiệm";
        btnStart.disabled = false;
        btnStep.disabled = false;

        // Xóa khói còn thừa
        document.querySelectorAll('.smoke').forEach(el => el.remove());
    }

    function stepExperiment() {
        pauseExperiment();
        // Nhảy thẳng đến các mốc thời gian quan trọng
        if (currentStepIndex === 0) {
            timer = 1000; // Nhảy đến 10s (Nóng chảy)
        } else if (currentStepIndex === 1) {
            timer = 2000; // Nhảy đến 20s (Caramel)
        } else if (currentStepIndex === 2) {
            timer = 2800; // Nhảy đến 28s (Phân hủy ra than)
        } else {
            resetExperiment();
            return;
        }
        
        flame.style.opacity = "1";
        updateSimulationVisuals();
        // Sau khi render khung hình, tắt lửa để học sinh quan sát tĩnh
        setTimeout(() => flame.style.opacity = "0", 300);
    }

    // --- GÁN SỰ KIỆN NÚT BẤM ---
    btnStart.addEventListener('click', startExperiment);
    btnPause.addEventListener('click', pauseExperiment);
    btnReset.addEventListener('click', resetExperiment);
    btnStep.addEventListener('click', stepExperiment);

    // Khởi tạo hiển thị ban đầu
    updateSimulationVisuals();
</script>

</body>
</html>
